<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контент-радар — SETKA</title>
    <script>
        (function () {
            try {
                var t = localStorage.getItem('setka-theme') || 'light';
                document.documentElement.setAttribute('data-bs-theme', t);
            } catch (e) { /* localStorage недоступен — остаёмся в light */ }
        })();
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="/radar"><i class="bi bi-broadcast"></i> Контент-радар</a>
            <ul class="navbar-nav ms-auto flex-row gap-3">
                <li class="nav-item"><span class="nav-link" id="me-badge"></span></li>
                <li class="nav-item">
                    <a class="nav-link" role="button" id="logout-btn" title="Выйти">
                        <i class="bi bi-box-arrow-right"></i>
                    </a>
                </li>
            </ul>
        </div>
    </nav>

    <div class="container py-5 text-center text-secondary">
        <i class="bi bi-broadcast" style="font-size: 3rem;"></i>
        <h1 class="h4 mt-3">Лента скоро появится</h1>
        <p>Источники и лента — следующие срезы стройки (Ф0.2–Ф0.4).<br>
           Аккаунт работает: вы вошли как radar-пользователь.</p>
    </div>

    <script>
        fetch('/api/auth/me').then(r => r.ok ? r.json() : null).then(u => {
            if (u) document.getElementById('me-badge').textContent = u.login;
        });
        document.getElementById('logout-btn').addEventListener('click', async () => {
            await fetch('/api/auth/logout', { method: 'POST' });
            location.href = '/login';
        });
    </script>
</body>
</html>
