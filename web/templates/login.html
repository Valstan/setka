<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Войти в {{ brand.title }}</title>
    <script>
        (function () {
            try {
                var t = localStorage.getItem('setka-theme') || 'light';
                document.documentElement.setAttribute('data-bs-theme', t);
            } catch (e) { /* localStorage недоступен — остаёмся в light */ }
        })();
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="d-flex align-items-center" style="min-height: 100vh;">
    <div class="container" style="max-width: 420px;">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <div class="text-center mb-1" style="font-size: 2.5rem; line-height: 1;">
                    {%- if brand.icon and brand.icon.startswith('http') -%}
                    <img src="{{ brand.icon }}" alt="" style="height: 48px;">
                    {%- else -%}
                    {{ brand.icon }}
                    {%- endif -%}
                </div>
                <h1 class="h4 mb-1 text-center">Войти в {{ brand.title }}</h1>
                <p class="text-secondary text-center mb-4" id="form-subtitle">{{ brand.sub }}</p>

                <div class="alert alert-danger d-none" id="error-box" role="alert"></div>

                <form id="auth-form">
                    <div class="mb-3">
                        <label class="form-label" for="login">Логин</label>
                        <input class="form-control" id="login" autocomplete="username" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="password">Пароль</label>
                        <input class="form-control" id="password" type="password"
                               autocomplete="current-password" required>
                    </div>
                    <div class="mb-3 d-none" id="invite-group">
                        <label class="form-label" for="invite">Инвайт-код</label>
                        <input class="form-control" id="invite" autocomplete="off">
                    </div>
                    <button class="btn btn-primary w-100" id="submit-btn" type="submit"
                            style="background-color: {{ brand.accent }}; border-color: {{ brand.accent }};">Войти</button>
                </form>

                <div class="d-flex align-items-center my-3">
                    <hr class="flex-grow-1"><span class="mx-2 text-secondary small">или</span><hr class="flex-grow-1">
                </div>
                <a class="btn btn-outline-primary w-100" id="vk-login-btn" href="/auth/vk/login">
                    <i class="bi bi-chat-fill me-1"></i>Войти через ВКонтакте
                </a>

                <div class="text-center mt-3">
                    <a href="#" class="link-secondary small" id="mode-toggle">Регистрация по инвайт-коду</a>
                </div>
                <p class="text-center text-secondary small mt-3 mb-0">
                    Единый вход «Сервисы Малмыжа» — один аккаунт для всех сервисов на вмалмыже.рф
                </p>
            </div>
        </div>
    </div>

    <script>
        let registerMode = false;
        const errorBox = document.getElementById('error-box');

        // next= пробрасывается и в форму, и в ВК-вход; только свои относительные пути.
        const rawNext = new URLSearchParams(location.search).get('next');
        const safeNext = rawNext && rawNext.startsWith('/') && !rawNext.startsWith('//') ? rawNext : null;
        if (safeNext) {
            document.getElementById('vk-login-btn').href = '/auth/vk/login?next=' + encodeURIComponent(safeNext);
        }

        document.getElementById('mode-toggle').addEventListener('click', (e) => {
            e.preventDefault();
            registerMode = !registerMode;
            document.getElementById('invite-group').classList.toggle('d-none', !registerMode);
            document.getElementById('form-subtitle').textContent =
                registerMode ? 'Регистрация (контент-радар)' : 'Вход в систему';
            document.getElementById('submit-btn').textContent = registerMode ? 'Зарегистрироваться' : 'Войти';
            e.target.textContent = registerMode ? 'У меня уже есть аккаунт' : 'Регистрация по инвайт-коду';
            errorBox.classList.add('d-none');
        });

        document.getElementById('auth-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            errorBox.classList.add('d-none');
            const payload = {
                login: document.getElementById('login').value.trim(),
                password: document.getElementById('password').value,
            };
            if (registerMode) payload.invite_code = document.getElementById('invite').value.trim();

            try {
                const resp = await fetch(registerMode ? '/api/auth/register' : '/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });
                const data = await resp.json().catch(() => ({}));
                if (!resp.ok) {
                    errorBox.textContent = data.detail || ('Ошибка ' + resp.status);
                    errorBox.classList.remove('d-none');
                    return;
                }
                // Оператор — в дашборд (или на исходную страницу); radar-юзер — в радар,
                // НО OIDC-возврат (next=/oidc/authorize?...) уважается для всех ролей —
                // иначе рвётся round-trip единого входа внешних сервисов.
                location.href = data.role === 'operator'
                    ? (safeNext || '/')
                    : (safeNext && safeNext.startsWith('/oidc/') ? safeNext : '/radar');
            } catch (err) {
                errorBox.textContent = 'Сеть недоступна: ' + err;
                errorBox.classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
