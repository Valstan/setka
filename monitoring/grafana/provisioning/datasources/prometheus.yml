# Grafana datasource provisioning.
# Файл копируется в /etc/grafana/provisioning/datasources/ при установке.

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://127.0.0.1:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: 30s
      httpMethod: POST
