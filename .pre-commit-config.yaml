# Линтеры используют тот python, который запустил pre-commit (берётся из
# активного venv). Black/isort/flake8 одинаково ведут себя на 3.11 и 3.12;
# жёсткое прибитие к конкретной версии раньше дважды ломало pre-commit у
# разработчиков, у которых её нет (см. `git log --grep='pre-commit'` —
# инциденты 2026-05-22 black на 3.12 и 2026-05-23 virtualenv не находил
# 3.11; раньше эти инциденты жили в DEV_HISTORY, упразднённой 2026-05-24).
# CI прибит к 3.12 через
# .github/workflows/ci.yml `python-version: ["3.12"]`.

# `pre-commit install` теперь ставит оба типа хуков (pre-commit + commit-msg),
# чтобы заработал гейт качества commit message (scripts/check_commit_msg.py).
default_install_hook_types: [pre-commit, commit-msg]

repos:
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        args: [--line-length, "100"]

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--profile", "black", "--line-length", "100"]

  - repo: https://github.com/pycqa/flake8
    rev: 7.1.1
    hooks:
      - id: flake8
        # Оставшиеся коды в ignore — только E203/W503: стандартный конфликт
        # black ↔ pep8, без них black и flake8 ругаются друг на друга. Все
        # остальные legacy-нарушения зачищены 2026-05-23 в 3 PR:
        #   - PR 1: E712/F841/W291/E303/E722/F601/F811/E302/W391/F541
        #     (+ 2 найденных runtime-бага в text_utils.py и system_monitoring.py).
        #   - PR 2: E501 — 96 строк получили # noqa: E501.
        #   - PR 3: E402 — 147 строк получили # noqa: E402 (типичная причина —
        #     `sys.path.insert(0, ...)` перед импортами; рефакторинг через
        #     pyproject.toml editable install — отдельная 🟢 идея).
        # Новые нарушения по всем этим кодам теперь ловятся pre-commit'ом.
        args:
          - "--max-line-length=100"
          - "--extend-ignore=E203,W503"
        exclude: ^(venv|build|dist)/

  # Локальный гейт качества commit message (Conventional Commits + тело для
  # feat/fix/refactor). stdlib-only скрипт, без внешних зависимостей.
  - repo: local
    hooks:
      - id: conventional-commit-msg
        name: conventional commit message
        entry: python scripts/check_commit_msg.py
        language: system
        stages: [commit-msg]
