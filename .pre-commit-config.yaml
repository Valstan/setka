# Default Python для всех хуков — 3.11 (локальные venv'ы worktree'ев).
# Прод на 3.12, но для линтеров разница нерелевантна, важно — чтобы
# pre-commit РЕАЛЬНО запускался на машине разработчика. Раньше был
# `language_version: python3.12` на black, и pre-commit падал у всех
# у кого нет 3.12 (см. DEV_HISTORY 2026-05-22 — incident в /reliz).
default_language_version:
  python: python3.11

repos:
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        args: [--line-length, "100"]

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--profile", "black", "--line-length", "100"]

  - repo: https://github.com/pycqa/flake8
    rev: 7.1.1
    hooks:
      - id: flake8
        # Расширенный ignore — компромисс между «починить всё» (~360 правок
        # legacy в /reliz 2026-05-22) и «не блокировать pre-commit». F821
        # (undefined name) НЕ в ignore — это реальные баги, оставляем как
        # стоп-сигнал. F401 (unused import) пусть тоже падает — autoflake
        # его быстро чинит.
        args:
          - "--max-line-length=100"
          - "--extend-ignore=E203,W503,E402,E501,E712,F841,W291,E303,E722,F601,F811,E302,W391,F541"
        exclude: ^(venv|build|dist)/
