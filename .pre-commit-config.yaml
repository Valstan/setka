# Линтеры используют тот python, который запустил pre-commit (берётся из
# активного venv). Black/isort/flake8 одинаково ведут себя на 3.11 и 3.12;
# жёсткое прибитие к конкретной версии раньше дважды ломало pre-commit у
# разработчиков, у которых её нет (DEV_HISTORY 2026-05-22 — black на 3.12;
# 2026-05-23 — virtualenv не находил 3.11). CI прибит к 3.12 через
# .github/workflows/ci.yml `python-version: ["3.12"]`.

repos:
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        args: [--line-length, "100"]

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--profile", "black", "--line-length", "100"]

  - repo: https://github.com/pycqa/flake8
    rev: 7.1.1
    hooks:
      - id: flake8
        # Оставшиеся коды в ignore — это:
        #   - E203/W503 — стандартный конфликт black ↔ pep8, нужен всегда.
        #   - E402 — будет зачищен отдельным PR (cleanup legacy, через
        #     # noqa: E402 с обоснованием на каждую `sys.path.insert`-import).
        # E501 зачищен 2026-05-23 «Legacy flake8 cleanup PR 2» (96 строк
        # получили # noqa: E501; новые длинные строки теперь ловятся).
        # E712/F841/W291/E303/E722/F601/F811/E302/W391/F541 зачищены 2026-05-23
        # «Legacy flake8 cleanup PR 1».
        args:
          - "--max-line-length=100"
          - "--extend-ignore=E203,W503,E402"
        exclude: ^(venv|build|dist)/
